services:
  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://server:3001
    volumes:
      - ./client:/app
      - /app/node_modules

  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    volumes:
      - ./server:/app
      - /app/node_modules
